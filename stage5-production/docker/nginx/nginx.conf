worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ========================================
    # SSE 流式输出兼容配置（最关键！）
    # ========================================
    # 关闭响应缓冲 — LLM 流式输出必须关闭
    # 默认 on：Nginx 缓冲整个响应再发送，SSE 会卡住
    # 关闭后：vLLM 每生成一个 token 立即转发给客户端
    proxy_buffering off;
    proxy_cache off;

    # LLM 生成可能耗时较长，需要加大超时
    # 默认 60s，长文本生成可能超过 60s 被中断
    # 流式模式下，每个 token 的到达会重置超时计时
    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;

    # ========================================
    # 限流配置
    # ========================================
    # 按 IP 限流：每秒最多 10 个请求，突发允许 20 个
    # 10m 区域可记录约 16 万个 IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ========================================
    # 负载均衡
    # ========================================
    upstream vllm_backend {
        # 最少连接数策略 — 适合 LLM 变长请求场景
        # round-robin 轮流分配，短请求和长请求分配不均
        # least_conn 总是分配给最空闲的实例
        least_conn;

        server host.docker.internal:8000;
        # 多实例时添加更多 server：
        # server vllm-2:8000;
    }

    server {
        listen 80;
        server_name _;

        # ========================================
        # API 路由
        # ========================================
        location / {
            # 限流：突发 20 个请求，超出直接返回 503（不排队）
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://vllm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 兼容性配置
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            add_header X-Accel-Buffering no;
        }

        # 健康检查端点（不经过限流）
        # Docker 和监控系统需要频繁访问 /health，不应被限流
        location /health {
            proxy_pass http://vllm_backend;
        }

        # Prometheus 指标端点
        # 生产环境应限制允许访问的 IP（Docker 内网段）
        location /metrics {
            # allow 172.16.0.0/12;
            # deny all;
            proxy_pass http://vllm_backend;
        }
    }
}
