# Stage 5: 多实例 vLLM 部署
#
# 架构：
#   vllm-7b  (GPU 0,1) — 7B 模型，日常对话
#   vllm-32b (GPU 2,3) — 32B AWQ 模型，复杂推理
#   nginx    — 按路径路由到不同模型
#
# 路由规则：
#   /v1/chat/completions (model=Qwen2.5-7B)   → vllm-7b
#   /v1/chat/completions (model=Qwen2.5-32B)  → vllm-32b
#
# 使用方法：
#   docker compose -f docker-compose.multi.yml up -d
#
# 注意：
#   - 需要预先下载 Qwen2.5-32B-Instruct-AWQ 模型
#   - Nginx 配置需要配合多实例修改（见下方说明）

services:
  vllm-7b:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: vllm-7b
    ports:
      - "8000:8000"
    volumes:
      - ${HF_HOME:-/data2/lvliping/hf_cache}:/root/.cache/huggingface:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=1
      - NVIDIA_DISABLE_REQUIRE=1
    command:
      - --model=Qwen/Qwen2.5-7B-Instruct
      - --tensor-parallel-size=2
      - --gpu-memory-utilization=0.9
      - --max-model-len=4096
      - --dtype=bfloat16
      - --port=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    networks:
      - llm-deploy-net
    restart: unless-stopped

  vllm-32b:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: vllm-32b
    ports:
      - "8001:8000"
    volumes:
      - ${HF_HOME:-/data2/lvliping/hf_cache}:/root/.cache/huggingface:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=1
      - NVIDIA_DISABLE_REQUIRE=1
    command:
      - --model=Qwen/Qwen2.5-32B-Instruct-AWQ
      - --quantization=awq
      - --tensor-parallel-size=2
      - --gpu-memory-utilization=0.9
      - --max-model-len=4096
      - --dtype=bfloat16
      - --port=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2', '3']
              capabilities: [gpu]
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    networks:
      - llm-deploy-net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      # 多实例时需要使用专门的 nginx 配置
      # 将 nginx.conf 中的 upstream 改为两个 server
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-7b:
        condition: service_healthy
      vllm-32b:
        condition: service_healthy
    networks:
      - llm-deploy-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./grafana/alerts/vllm_alerts.yml:/etc/prometheus/alerts/vllm_alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      vllm-7b:
        condition: service_healthy
      vllm-32b:
        condition: service_healthy
    networks:
      - llm-deploy-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - llm-deploy-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  llm-deploy-net:
    driver: bridge
